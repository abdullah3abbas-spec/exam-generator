<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولّد الامتحانات الذكي | الصف الثاني عشر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #0a0e1a;
    --panel: #0f1629;
    --card: #141d35;
    --border: #1e2d54;
    --gold: #f5c842;
    --gold2: #e8a020;
    --cyan: #00d4ff;
    --green: #00e5a0;
    --red: #ff4f6b;
    --text: #e8eaf6;
    --muted: #7986cb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--deep); color: var(--text); font-family: 'Cairo', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .glow-orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
  .orb1 { width: 500px; height: 500px; background: rgba(245,200,66,0.07); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(0,212,255,0.05); bottom: -100px; left: -50px; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
  .header { text-align: center; padding: 50px 0 30px; animation: fadeDown 0.8s ease; }
  .badge { display: inline-block; background: linear-gradient(135deg, rgba(245,200,66,0.15), rgba(232,160,32,0.1)); border: 1px solid rgba(245,200,66,0.3); color: var(--gold); padding: 6px 18px; border-radius: 50px; font-size: 13px; font-weight: 600; margin-bottom: 16px; letter-spacing: 1px; }
  h1 { font-family: 'Tajawal', sans-serif; font-size: clamp(28px, 5vw, 48px); font-weight: 900; background: linear-gradient(135deg, #fff 30%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; margin-bottom: 12px; }
  .subtitle { color: var(--muted); font-size: 16px; font-weight: 400; }
  .config-panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 24px; animation: fadeUp 0.8s ease 0.2s both; }
  .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .field-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gold); margin-bottom: 8px; }
  .field-group select { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; direction: rtl; }
  .field-group select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,200,66,0.1); }
  .topic-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .chip { background: var(--panel); border: 1px solid var(--border); border-radius: 50px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all 0.2s; color: var(--muted); }
  .chip.active { background: linear-gradient(135deg, rgba(245,200,66,0.2), rgba(232,160,32,0.15)); border-color: var(--gold); color: var(--gold); }
  .generate-btn { width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold2)); border: none; border-radius: 12px; padding: 16px; color: var(--deep); font-family: 'Cairo', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .generate-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(245,200,66,0.35); }
  .generate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .loading-wrap { display: none; text-align: center; padding: 50px 20px; }
  .loading-wrap.show { display: block; }
  .spinner { width: 60px; height: 60px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 20px; animation: spin 0.8s linear infinite; }
  .loading-text { color: var(--muted); font-size: 15px; animation: pulse 1.5s ease infinite; }
  #exam-output { display: none; animation: fadeUp 0.6s ease; }
  #exam-output.show { display: block; }
  .exam-header-bar { background: linear-gradient(135deg, var(--card), #1a2545); border: 1px solid var(--border); border-radius: 16px; padding: 24px 28px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .exam-title-wrap h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .exam-meta { display: flex; gap: 16px; flex-wrap: wrap; }
  .meta-tag { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.2); color: var(--gold); padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 600; }
  .exam-actions { display: flex; gap: 10px; }
  .btn-sm { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Cairo', sans-serif; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .btn-sm:hover { border-color: var(--gold); color: var(--gold); }
  .section-title { font-size: 18px; font-weight: 700; color: var(--cyan); margin: 28px 0 16px; display: flex; align-items: center; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .section-title .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .mcq-section .icon { background: rgba(0,212,255,0.1); }
  .essay-section .icon { background: rgba(0,229,160,0.1); }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 14px; transition: border-color 0.2s; }
  .question-card:hover { border-color: rgba(245,200,66,0.3); }
  .q-number { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: linear-gradient(135deg, var(--gold), var(--gold2)); border-radius: 8px; color: var(--deep); font-size: 13px; font-weight: 900; margin-left: 10px; flex-shrink: 0; }
  .q-text { font-size: 15px; font-weight: 600; line-height: 1.7; display: flex; align-items: flex-start; gap: 4px; margin-bottom: 16px; color: #fff; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .option { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .option:hover { border-color: var(--cyan); background: rgba(0,212,255,0.05); }
  .option.selected { border-color: var(--cyan); background: rgba(0,212,255,0.1); color: var(--cyan); }
  .option.correct { border-color: var(--green); background: rgba(0,229,160,0.1); color: var(--green); }
  .option.wrong { border-color: var(--red); background: rgba(255,79,107,0.1); color: var(--red); }
  .option-letter { width: 22px; height: 22px; border-radius: 6px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .essay-answer { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px; line-height: 1.8; resize: vertical; min-height: 100px; outline: none; transition: border-color 0.2s; direction: rtl; margin-top: 10px; }
  .essay-answer:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,229,160,0.1); }
  .marks-badge { float: left; background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.2); color: var(--green); padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; margin-top: 4px; }
  .check-btn { margin-top: 20px; background: linear-gradient(135deg, var(--cyan), #0099bb); border: none; border-radius: 10px; padding: 13px 28px; color: #fff; font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
  .check-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,212,255,0.3); }
  .score-card { background: linear-gradient(135deg, rgba(0,229,160,0.1), rgba(0,212,255,0.08)); border: 1px solid rgba(0,229,160,0.3); border-radius: 16px; padding: 24px; text-align: center; margin-top: 24px; display: none; animation: popIn 0.4s ease; }
  .score-card.show { display: block; }
  .score-number { font-size: 52px; font-weight: 900; color: var(--green); }
  .score-label { color: var(--muted); font-size: 15px; margin-top: 4px; }
  .answer-reveal { margin-top: 12px; padding: 12px 16px; background: rgba(0,229,160,0.07); border: 1px solid rgba(0,229,160,0.2); border-radius: 10px; font-size: 13px; color: var(--green); display: none; }
  .answer-reveal.show { display: block; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
